<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼각형 면적 계산기</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #0078D4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #005A9E;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #0078D4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>삼각형 면적 계산기</h2>

        <label for="base">밑변</label>
        <input type="number" id="base" placeholder="밑변 입력">

        <label for="height">높이</label>
        <input type="number" id="height" placeholder="높이 입력">

        <button onclick="calculateArea()">계산하기</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateArea() {
            const base = parseFloat(document.getElementById("base").value);
            const height = parseFloat(document.getElementById("height").value);

            if (isNaN(base) || isNaN(height)) {
                document.getElementById("result").innerHTML =
                    "밑변과 높이를 입력하세요.";
                return;
            }

            const area = base * height / 2;

            document.getElementById("result").innerHTML =
                "면적 : " + area.toFixed(2) + " ㎡";
        }
    </script>

</body>
</html>
